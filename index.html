<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雙人修持念經計數器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&display=swap');
        body {
            font-family: 'Noto Serif TC', serif;
            background: #121212;
            color: #e0e0e0;
        }
        .wood-card {
            background: linear-gradient(145deg, #1e1b18, #2a241f);
            border: 1px solid #3d3228;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        .gold-border { border-color: #d4af37; }
        .gold-text { color: #dfb76c; }
        .gold-btn {
            background: linear-gradient(135deg, #c59b27, #9a761c);
            color: #ffffff;
            transition: all 0.2s;
        }
        .gold-btn:hover {
            background: linear-gradient(135deg, #d4af37, #b88e20);
            transform: translateY(-2px);
        }
        .gold-btn:active { transform: translateY(1px); }
        .tab-active {
            border-bottom: 3px solid #dfb76c;
            color: #dfb76c;
        }
    </style>
</head>
<body class="min-h-screen pb-12">
    <!-- Top Sync Status Bar -->
    <div id="sync-bar" class="bg-stone-900 border-b border-stone-800 text-xs text-center py-2 text-stone-400 flex justify-center items-center gap-2">
        <span id="sync-dot" class="w-2 h-2 rounded-full bg-yellow-500 inline-block"></span>
        <span id="sync-status">檢查雲端連線狀態中...</span>
    </div>

    <div class="max-w-xl mx-auto px-4 pt-6">
        <!-- Header -->
        <header class="text-center mb-6">
            <h1 class="text-3xl font-bold gold-text tracking-wider flex justify-center items-center gap-2">
                <i class="fa-solid font-serif">☸</i> 雙人修持計數器
            </h1>
            <p class="text-xs text-stone-400 mt-1">Dicky & Hannah 共同修持記錄</p>
        </header>

        <!-- Main Navigation Tabs -->
        <div class="flex border-b border-stone-800 mb-6 text-center text-sm">
            <button id="tab-btn-counter" onclick="switchTab('counter')" class="flex-1 py-3 font-semibold tab-active">
                <i class="fa-solid fa-hand-holding-heart mr-1"></i> 修持計數
            </button>
            <button id="tab-btn-stats" onclick="switchTab('stats')" class="flex-1 py-3 font-semibold text-stone-500">
                <i class="fa-solid fa-chart-pie mr-1"></i> 共修總覽
            </button>
        </div>

        <!-- COUNTER VIEW -->
        <div id="view-counter" class="space-y-6">
            <!-- User Switcher -->
            <div class="wood-card p-2 rounded-xl flex gap-2">
                <button id="user-btn-Dicky" onclick="selectUser('Dicky')" class="flex-1 py-2.5 rounded-lg font-semibold text-sm transition-all bg-amber-900/40 text-amber-200 border border-amber-700/50">
                    <i class="fa-solid fa-user mr-1.5"></i> Dicky
                </button>
                <button id="user-btn-Hannah" onclick="selectUser('Hannah')" class="flex-1 py-2.5 rounded-lg font-semibold text-sm transition-all text-stone-400 hover:text-stone-200">
                    <i class="fa-solid fa-user-nurse mr-1.5"></i> Hannah
                </button>
            </div>

            <!-- Scripture Selector -->
            <div class="wood-card p-4 rounded-xl">
                <label class="block text-xs gold-text mb-2 font-semibold">選擇修持經典：</label>
                <div class="grid grid-cols-2 gap-2">
                    <button id="sutra-btn-金剛經" onclick="setScripture('金剛經')" class="py-2 px-3 rounded-lg text-xs font-semibold border border-amber-600/40 bg-amber-900/30 gold-text">
                        《金剛經》
                    </button>
                    <button id="sutra-btn-地藏經上" onclick="setScripture('地藏經上')" class="py-2 px-3 rounded-lg text-xs font-semibold border border-stone-800 bg-stone-900/60 text-stone-400">
                        《地藏經》上卷
                    </button>
                    <button id="sutra-btn-地藏經中" onclick="setScripture('地藏經中')" class="py-2 px-3 rounded-lg text-xs font-semibold border border-stone-800 bg-stone-900/60 text-stone-400">
                        《地藏經》中卷
                    </button>
                    <button id="sutra-btn-地藏經下" onclick="setScripture('地藏經下')" class="py-2 px-3 rounded-lg text-xs font-semibold border border-stone-800 bg-stone-900/60 text-stone-400">
                        《地藏經》下卷
                    </button>
                </div>
            </div>

            <!-- Counter Display Card -->
            <div class="wood-card p-6 rounded-2xl text-center relative overflow-hidden border border-amber-900/30">
                <div class="text-xs text-stone-400 mb-1">目前選擇：<span id="display-user" class="gold-text font-bold">Dicky</span> - <span id="display-sutra" class="text-amber-300 font-bold">《金剛經》</span></div>
                
                <div class="my-6">
                    <div id="count-number" class="text-6xl font-bold tracking-tight gold-text">0</div>
                    <div class="text-xs text-stone-500 mt-2">個人累計遍數</div>
                </div>

                <!-- Individual Ksitigarbha Full Count Notice -->
                <div id="ksitigarbha-notice" class="hidden mb-4 p-2.5 rounded-lg bg-amber-950/40 border border-amber-800/40 text-xs text-amber-200">
                    ✨ <span id="ksitigarbha-user-name">Dicky</span> 已完成 <span id="ksitigarbha-full-count" class="font-bold text-amber-400">0</span> 部完整《地藏經》
                    <div class="text-[10px] text-stone-400 mt-1">獨立完成上/中/下卷各 1 遍自動進位 1 部</div>
                </div>

                <!-- Counter Actions -->
                <div class="space-y-3">
                    <button onclick="addCount(1)" class="w-full py-4 gold-btn text-lg font-bold rounded-xl shadow-lg flex items-center justify-center gap-2">
                        <i class="fa-solid fa-plus text-sm"></i> 完成 1 遍
                    </button>
                    <button onclick="promptManualEntry()" class="w-full py-2.5 bg-stone-800 hover:bg-stone-700 text-stone-300 text-xs rounded-lg transition-all border border-stone-700">
                        <i class="fa-solid fa-pen-to-square mr-1"></i> 手動補錄遍數
                    </button>
                </div>
            </div>
        </div>

        <!-- STATS VIEW -->
        <div id="view-stats" class="space-y-6 hidden">
            <!-- Combined Grand Totals -->
            <div class="grid grid-cols-2 gap-4">
                <div class="wood-card p-4 rounded-xl text-center border-l-4 border-amber-500">
                    <div class="text-xs text-stone-400">兩人合共《金剛經》</div>
                    <div id="total-diamond" class="text-2xl font-bold gold-text mt-1">0 <span class="text-xs font-normal">遍</span></div>
                </div>
                <div class="wood-card p-4 rounded-xl text-center border-l-4 border-yellow-500">
                    <div class="text-xs text-stone-400">兩人合共《地藏經》</div>
                    <div id="total-ksitigarbha" class="text-2xl font-bold text-yellow-400 mt-1">0 <span class="text-xs font-normal">部</span></div>
                </div>
            </div>

            <!-- Dicky Breakdown -->
            <div class="wood-card p-5 rounded-xl space-y-3">
                <div class="flex justify-between items-center border-b border-stone-800 pb-2">
                    <span class="font-bold gold-text text-sm"><i class="fa-solid fa-user mr-1.5"></i> Dicky 修持明細</span>
                    <span id="dicky-full-ksitigarbha" class="text-xs bg-amber-900/60 text-amber-300 px-2 py-0.5 rounded border border-amber-700/50">地藏經: 0 部</span>
                </div>
                <div class="grid grid-cols-2 gap-2 text-xs text-stone-300">
                    <div>金剛經：<span id="dicky-diamond" class="font-bold text-white">0</span> 遍</div>
                    <div>地藏經(上)：<span id="dicky-k-top" class="font-bold text-white">0</span> 遍</div>
                    <div>地藏經(中)：<span id="dicky-k-mid" class="font-bold text-white">0</span> 遍</div>
                    <div>地藏經(下)：<span id="dicky-k-bot" class="font-bold text-white">0</span> 遍</div>
                </div>
            </div>

            <!-- Hannah Breakdown -->
            <div class="wood-card p-5 rounded-xl space-y-3">
                <div class="flex justify-between items-center border-b border-stone-800 pb-2">
                    <span class="font-bold gold-text text-sm"><i class="fa-solid fa-user-nurse mr-1.5"></i> Hannah 修持明細</span>
                    <span id="hannah-full-ksitigarbha" class="text-xs bg-amber-900/60 text-amber-300 px-2 py-0.5 rounded border border-amber-700/50">地藏經: 0 部</span>
                </div>
                <div class="grid grid-cols-2 gap-2 text-xs text-stone-300">
                    <div>金剛經：<span id="hannah-diamond" class="font-bold text-white">0</span> 遍</div>
                    <div>地藏經(上)：<span id="hannah-k-top" class="font-bold text-white">0</span> 遍</div>
                    <div>地藏經(中)：<span id="hannah-k-mid" class="font-bold text-white">0</span> 遍</div>
                    <div>地藏經(下)：<span id="hannah-k-bot" class="font-bold text-white">0</span> 遍</div>
                </div>
            </div>

            <!-- Log Stream -->
            <div class="wood-card p-4 rounded-xl">
                <h3 class="text-xs font-bold gold-text mb-3 flex justify-between items-center">
                    <span><i class="fa-solid fa-clock-rotate-left mr-1"></i> 最新修持動態</span>
                    <button onclick="fetchState()" class="text-[10px] text-stone-400 hover:text-stone-200">刷新</button>
                </h3>
                <div id="log-list" class="space-y-2 max-h-48 overflow-y-auto text-xs text-stone-400 divide-y divide-stone-800/60">
                    <div class="pt-2 text-center text-stone-600">暫無修持紀錄</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // State Machine
        let state = {
            currentUser: 'Dicky',
            currentSutra: '金剛經',
            counts: {
                Dicky: { 金剛經: 0, 地藏經上: 0, 地藏經中: 0, 地藏經下: 0, 地藏經完整部數: 0 },
                Hannah: { 金剛經: 0, 地藏經上: 0, 地藏經中: 0, 地藏經下: 0, 地藏經完整部數: 0 }
            },
            logs: []
        };

        const sutraMap = {
            '金剛經': '《金剛經》',
            '地藏經上': '《地藏經》上卷',
            '地藏經中': '《地藏經》中卷',
            '地藏經下': '《地藏經》下卷'
        };

        window.onload = function() {
            fetchState();
        };

        async function fetchState() {
            try {
                const res = await fetch('/api/state');
                if (res.ok) {
                    const data = await res.json();
                    if (data && data.counts) {
                        state.counts = data.counts;
                        state.logs = data.logs || [];
                        updateSyncBar(true, '🟢 MongoDB 雲端同步中');
                    }
                } else {
                    updateSyncBar(false, '🟡 離線模式 (即時保存於本地)');
                    loadLocalState();
                }
            } catch (err) {
                updateSyncBar(false, '🟡 離線模式 (即時保存於本地)');
                loadLocalState();
            }
            renderUI();
        }

        function loadLocalState() {
            const saved = localStorage.getItem('buddhist_counter_state');
            if (saved) {
                try { state.counts = JSON.parse(saved); } catch(e){}
            }
        }

        function saveLocalState() {
            localStorage.setItem('buddhist_counter_state', JSON.stringify(state.counts));
        }

        function updateSyncBar(isOnline, text) {
            document.getElementById('sync-status').innerText = text;
            document.getElementById('sync-dot').className = `w-2 h-2 rounded-full inline-block ${isOnline ? 'bg-emerald-500' : 'bg-amber-500'}`;
        }

        function switchTab(tab) {
            document.getElementById('view-counter').classList.toggle('hidden', tab !== 'counter');
            document.getElementById('view-stats').classList.toggle('hidden', tab !== 'stats');
            document.getElementById('tab-btn-counter').className = `flex-1 py-3 font-semibold ${tab === 'counter' ? 'tab-active' : 'text-stone-500'}`;
            document.getElementById('tab-btn-stats').className = `flex-1 py-3 font-semibold ${tab === 'stats' ? 'tab-active' : 'text-stone-500'}`;
        }

        function selectUser(user) {
            state.currentUser = user;
            ['Dicky', 'Hannah'].forEach(u => {
                const btn = document.getElementById(`user-btn-${u}`);
                if (u === user) {
                    btn.className = "flex-1 py-2.5 rounded-lg font-semibold text-sm transition-all bg-amber-900/40 text-amber-200 border border-amber-700/50";
                } else {
                    btn.className = "flex-1 py-2.5 rounded-lg font-semibold text-sm transition-all text-stone-400 hover:text-stone-200";
                }
            });
            renderUI();
        }

        function setScripture(sutra) {
            state.currentSutra = sutra;
            ['金剛經', '地藏經上', '地藏經中', '地藏經下'].forEach(s => {
                const btn = document.getElementById(`sutra-btn-${s}`);
                if (s === sutra) {
                    btn.className = "py-2 px-3 rounded-lg text-xs font-semibold border border-amber-600/40 bg-amber-900/30 gold-text";
                } else {
                    btn.className = "py-2 px-3 rounded-lg text-xs font-semibold border border-stone-800 bg-stone-900/60 text-stone-400";
                }
            });
            renderUI();
        }

        async function addCount(amount) {
            const user = state.currentUser;
            const sutra = state.currentSutra;

            try {
                const res = await fetch('/api/increment', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user, sutra, amount })
                });

                if (res.ok) {
                    const data = await res.json();
                    state.counts = data.counts;
                    state.logs = data.logs || [];
                } else {
                    fallbackLocalIncrement(user, sutra, amount);
                }
            } catch (err) {
                fallbackLocalIncrement(user, sutra, amount);
            }
            renderUI();
        }

        function fallbackLocalIncrement(user, sutra, amount) {
            state.counts[user][sutra] = (state.counts[user][sutra] || 0) + amount;
            
            // Check individual Ksitigarbha auto carry for the current user
            const uData = state.counts[user];
            if (uData.地藏經上 >= 1 && uData.地藏經中 >= 1 && uData.地藏經下 >= 1) {
                const min = Math.min(uData.地藏經上, uData.地藏經中, uData.地藏經下);
                uData.地藏經上 -= min;
                uData.地藏經中 -= min;
                uData.地藏經下 -= min;
                uData.地藏經完整部數 = (uData.地藏經完整部數 || 0) + min;
            }
            saveLocalState();
        }

        function promptManualEntry() {
            const input = prompt(`請輸入 ${state.currentUser} 補錄《${state.currentSutra}》的遍數：`, '1');
            const num = parseInt(input, 10);
            if (!isNaN(num) && num > 0) {
                addCount(num);
            }
        }

        function renderUI() {
            const user = state.currentUser;
            const sutra = state.currentSutra;

            document.getElementById('display-user').innerText = user;
            document.getElementById('display-sutra').innerText = sutraMap[sutra];
            document.getElementById('count-number').innerText = state.counts[user][sutra] || 0;

            // Ksitigarbha individual notice
            const notice = document.getElementById('ksitigarbha-notice');
            const kCount = state.counts[user].地藏經完整部數 || 0;
            document.getElementById('ksitigarbha-user-name').innerText = user;
            document.getElementById('ksitigarbha-full-count').innerText = kCount;
            notice.classList.toggle('hidden', !sutra.startsWith('地藏經'));

            // Totals
            const totalDiamond = (state.counts.Dicky.金剛經 || 0) + (state.counts.Hannah.金剛經 || 0);
            const totalKsitigarbha = (state.counts.Dicky.地藏經完整部數 || 0) + (state.counts.Hannah.地藏經完整部數 || 0);
            document.getElementById('total-diamond').innerHTML = `${totalDiamond} <span class="text-xs font-normal">遍</span>`;
            document.getElementById('total-ksitigarbha').innerHTML = `${totalKsitigarbha} <span class="text-xs font-normal">部</span>`;

            // Dicky breakdown
            document.getElementById('dicky-diamond').innerText = state.counts.Dicky.金剛經 || 0;
            document.getElementById('dicky-k-top').innerText = state.counts.Dicky.地藏經上 || 0;
            document.getElementById('dicky-k-mid').innerText = state.counts.Dicky.地藏經中 || 0;
            document.getElementById('dicky-k-bot').innerText = state.counts.Dicky.地藏經下 || 0;
            document.getElementById('dicky-full-ksitigarbha').innerText = `地藏經: ${state.counts.Dicky.地藏經完整部數 || 0} 部`;

            // Hannah breakdown
            document.getElementById('hannah-diamond').innerText = state.counts.Hannah.金剛經 || 0;
            document.getElementById('hannah-k-top').innerText = state.counts.Hannah.地藏經上 || 0;
            document.getElementById('hannah-k-mid').innerText = state.counts.Hannah.地藏經中 || 0;
            document.getElementById('hannah-k-bot').innerText = state.counts.Hannah.地藏經下 || 0;
            document.getElementById('hannah-full-ksitigarbha').innerText = `地藏經: ${state.counts.Hannah.地藏經完整部數 || 0} 部`;

            // Logs
            const logContainer = document.getElementById('log-list');
            if (state.logs && state.logs.length > 0) {
                logContainer.innerHTML = state.logs.map(log => `
                    <div class="pt-2 flex justify-between items-center">
                        <span><strong class="text-amber-200">${log.user}</strong> 修持 ${sutraMap[log.sutra] || log.sutra} +${log.amount}</span>
                        <span class="text-[10px] text-stone-500">${new Date(log.timestamp).toLocaleTimeString()}</span>
                    </div>
                `).join('');
            }
        }
    </script>
</body>
</html>
